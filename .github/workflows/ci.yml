name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Headless tests (Godot 4.7)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Godot 4.7
        run: |
          set -e
          URL="https://github.com/godotengine/godot/releases/download/4.7-stable/Godot_v4.7-stable_linux.x86_64.zip"
          wget -q "$URL" -O godot.zip
          unzip -q godot.zip
          mv Godot_v4.7-stable_linux.x86_64 godot
          chmod +x godot
          ./godot --version

      - name: Import project (compiles all scripts, catches parse errors)
        run: timeout 300 ./godot --headless --import --path . 2>&1 | tee import.log || true

      - name: Self-tests — OSC codec + SVG backend
        run: |
          ./godot --headless --path . --script res://tools/test_internals.gd 2>&1 | tee test.log
          grep -q "\[codec\] PASS" test.log
          grep -q "\[svg\] PASS" test.log

      - name: Self-tests — physics joints
        run: |
          ./godot --headless --path . --script res://tools/test_joints.gd 2>&1 | tee joints.log
          grep -q "fail=0" joints.log && ! grep -q "FAIL:" joints.log

      - name: Self-tests — sensor zones
        run: |
          ./godot --headless --path . --script res://tools/test_zones.gd 2>&1 | tee zones.log
          grep -q "fail=0" zones.log && ! grep -q "FAIL:" zones.log

      - name: Self-tests — event system
        run: |
          ./godot --headless --path . --script res://tools/test_events.gd 2>&1 | tee events.log
          grep -q "fail=0" events.log && ! grep -q "FAIL:" events.log

      - name: Self-tests — scene clear (id-spaces)
        run: |
          ./godot --headless --path . --script res://tools/test_scene_clear.gd 2>&1 | tee sceneclear.log
          grep -q "fail=0" sceneclear.log && ! grep -q "FAIL:" sceneclear.log

      - name: Self-tests — rigid-body pos while simulating
        run: |
          ./godot --headless --path . --script res://tools/test_rigid_pos.gd 2>&1 | tee rigidpos.log
          grep -q "fail=0" rigidpos.log && ! grep -q "FAIL:" rigidpos.log

      - name: Self-tests — camera
        run: |
          ./godot --headless --path . --script res://tools/test_camera.gd 2>&1 | tee camera.log
          grep -q "fail=0" camera.log && ! grep -q "FAIL:" camera.log

      - name: Self-tests — scene reset
        run: |
          ./godot --headless --path . --script res://tools/test_scene_reset.gd 2>&1 | tee scenereset.log
          grep -q "fail=0" scenereset.log && ! grep -q "FAIL:" scenereset.log

      - name: Self-tests — joint debug overlay
        run: |
          ./godot --headless --path . --script res://tools/test_joint_debug.gd 2>&1 | tee jointdebug.log
          grep -q "fail=0" jointdebug.log && ! grep -q "FAIL:" jointdebug.log

      - name: Self-tests — planar lock
        run: |
          ./godot --headless --path . --script res://tools/test_planar.gd 2>&1 | tee planar.log
          grep -q "fail=0" planar.log && ! grep -q "FAIL:" planar.log

      - name: Self-tests — sizable primitives
        run: |
          ./godot --headless --path . --script res://tools/test_sizable.gd 2>&1 | tee sizable.log
          grep -q "fail=0" sizable.log && ! grep -q "FAIL:" sizable.log

      - name: Self-tests — volumetric primitives
        run: |
          ./godot --headless --path . --script res://tools/test_volumetric.gd 2>&1 | tee volumetric.log
          grep -q "fail=0" volumetric.log && ! grep -q "FAIL:" volumetric.log

      - name: Self-tests — material mode
        run: |
          ./godot --headless --path . --script res://tools/test_material_mode.gd 2>&1 | tee materialmode.log
          grep -q "fail=0" materialmode.log && ! grep -q "FAIL:" materialmode.log

      - name: Self-tests — lighting
        run: |
          ./godot --headless --path . --script res://tools/test_lighting.gd 2>&1 | tee lighting.log
          grep -q "fail=0" lighting.log && ! grep -q "FAIL:" lighting.log

      - name: Self-tests — OSC output (port list)
        run: |
          ./godot --headless --path . --script res://tools/test_osc_output.gd 2>&1 | tee oscout.log
          grep -q "fail=0" oscout.log && ! grep -q "FAIL:" oscout.log

      - name: Self-tests — OSC output command
        run: |
          ./godot --headless --path . --script res://tools/test_osc_output_cmd.gd 2>&1 | tee oscoutcmd.log
          grep -q "fail=0" oscoutcmd.log && ! grep -q "FAIL:" oscoutcmd.log

      - name: Boot check — no script/parse errors
        run: |
          ./godot --headless --path . --quit-after 300 2>&1 | tee boot.log
          if grep -qiE "SCRIPT ERROR|Parse Error|Failed to load script" boot.log; then
            echo "::error::Runtime/parse errors during boot"; exit 1
          fi
